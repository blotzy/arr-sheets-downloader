[google]
# Authentication: use one of api_key or service_account_file (not both)
api_key = "example"
# service_account_file = "/path/to/service-account.json"
spreadsheet_id = "12345asdfbowijid"
# Skip the first row since that's where I put the instructions
spreadsheet_range = "Sheet1!A2:A"
write_status = true  # set to false to skip writing status/date back to the sheet
